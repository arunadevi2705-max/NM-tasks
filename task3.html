<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User CRUD with Email Validation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #edf2ff;
        }

        .container {
            width: 600px;
            margin: 60px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #888;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 45%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }

        .add-btn {
            background-color: #28a745;
            margin-top: 10px;
        }

        .edit-btn {
            background-color: #ffc107;
            color: black;
        }

        .delete-btn {
            background-color: #dc3545;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>User Management</h2>

    <input type="text" id="username" placeholder="Enter User Name">
    <input type="text" id="email" placeholder="Enter Email ID">
    <br>
    <button class="add-btn" onclick="addUser()">Add / Update</button>

    <table>
        <thead>
            <tr>
                <th>User Name</th>
                <th>Email ID</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<script>
    let selectedRow = null;

    function validateEmail(email) {
        let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return pattern.test(email);
    }

    function addUser() {
        let username = document.getElementById("username").value;
        let email = document.getElementById("email").value;

        if (username === "" || email === "") {
            alert("All fields are required");
            return;
        }

        if (!validateEmail(email)) {
            alert("Invalid Email ID format!\nExample: user@gmail.com");
            return;
        }

        if (selectedRow === null) {
            let table = document.getElementById("userTable");
            let row = table.insertRow();

            row.insertCell(0).innerHTML = username;
            row.insertCell(1).innerHTML = email;
            row.insertCell(2).innerHTML =
                "<button class='edit-btn' onclick='editUser(this)'>Edit</button>";
            row.insertCell(3).innerHTML =
                "<button class='delete-btn' onclick='deleteUser(this)'>Delete</button>";
        } else {
            selectedRow.cells[0].innerHTML = username;
            selectedRow.cells[1].innerHTML = email;
            selectedRow = null;
        }

        document.getElementById("username").value = "";
        document.getElementById("email").value = "";
    }

    function editUser(button) {
        selectedRow = button.parentElement.parentElement;
        document.getElementById("username").value = selectedRow.cells[0].innerHTML;
        document.getElementById("email").value = selectedRow.cells[1].innerHTML;
    }

    function deleteUser(button) {
        if (confirm("Are you sure you want to delete this record?")) {
            let row = button.parentElement.parentElement;
            row.remove();
        }
    }
</script>

</body>
</html>
